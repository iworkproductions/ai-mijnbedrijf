<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ai-mijnbedrijf.nl — Binnenkort online</title>
    <meta name="description" content="AI voor jouw bedrijf. Concreet, betaalbaar, zonder gedoe. Binnenkort online.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            line-height: 1.5;
        }
        .container {
            max-width: 640px;
            text-align: center;
        }
        .badge {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            color: #a0a0a0;
        }
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }
        h1 .accent {
            color: #4ade80;
        }
        p {
            font-size: 1.1rem;
            color: #b0b0b0;
            margin-bottom: 2.5rem;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }
        .contact {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: #ffffff;
            color: #0a0a0a;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.2s ease;
        }
        .contact:hover {
            transform: translateY(-2px);
        }
        footer {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Binnenkort online</span>
        <h1>AI voor <span class="accent">jouw bedrijf</span>.</h1>
        <p>Concreet, betaalbaar, zonder gedoe. We nemen het werk uit handen waar je toch geen tijd voor hebt.</p>
        <a href="mailto:info@ai-mijnbedrijf.nl" class="contact">info@ai-mijnbedrijf.nl</a>
    </div>
    <footer>© 2026 ai-mijnbedrijf.nl</footer>
</body>
</html>
